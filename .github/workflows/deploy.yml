name: Deploy — fgdsdg

on:
  workflow_dispatch:

env:
  ACTIONS_RUNNER_FORCED_INTERNAL_NODE_VERSION: node24
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: '[ -f requirements.txt ] && pip install -r requirements.txt || echo "no requirements.txt — skipping"'
      - run: pytest --tb=short -q 2>/dev/null || echo "No tests found"

  build_push:
    name: Build & Push Docker Image to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
      - name: Login to ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Resolve image tag
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.login_ecr.outputs.registry }}"
          PROJECT_NAME=$(echo "${{ secrets.PROJECT_NAME }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//; s/-$//')
          IMAGE="${ECR_REGISTRY}/${PROJECT_NAME}:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "project_lower=${PROJECT_NAME}" >> $GITHUB_OUTPUT
      - name: Ensure ECR repository exists
        run: |
          PROJECT_NAME=$(echo "${{ secrets.PROJECT_NAME }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//; s/-$//')
          if aws ecr describe-repositories \
               --repository-names "${PROJECT_NAME}" \
               --region "${{ secrets.AWS_REGION }}" > /dev/null 2>&1; then
            echo "ECR repo '${PROJECT_NAME}' already exists"
          else
            echo "Creating ECR repo '${PROJECT_NAME}'..."
            aws ecr create-repository \
              --repository-name "${PROJECT_NAME}" \
              --image-tag-mutability MUTABLE \
              --region "${{ secrets.AWS_REGION }}"
          fi
      - name: Build & push Docker image
        run: |
          docker build -t ${{ steps.meta.outputs.image }} .
          docker push ${{ steps.meta.outputs.image }}

  provision:
    name: Provision EKS via Terraform
    runs-on: ubuntu-latest
    needs: build_push
    outputs:
      cluster_name: ${{ steps.tf_out.outputs.cluster_name }}
      namespace:    ${{ steps.tf_out.outputs.namespace }}
      ecr_url:      ${{ steps.tf_out.outputs.ecr_url }}
      app_env_json: ${{ steps.tf_out.outputs.app_env_json }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
      - name: Create S3 state bucket
        run: |
          aws s3 mb s3://${{ secrets.TF_STATE_BUCKET }} \
            --region ${{ secrets.AWS_REGION }} 2>/dev/null || true
          aws s3api put-bucket-versioning \
            --bucket ${{ secrets.TF_STATE_BUCKET }} \
            --versioning-configuration Status=Enabled 2>/dev/null || true
      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_container_image:        ${{ needs.build_push.outputs.image }}
          TF_VAR_database_url:           ${{ secrets.DATABASE_URL }}
          TF_VAR_db_host:                ${{ secrets.DB_HOST }}
          TF_VAR_db_port:                ${{ secrets.DB_PORT }}
          TF_VAR_db_name:                ${{ secrets.DB_NAME }}
          TF_VAR_db_username:            ${{ secrets.DB_USER }}
          TF_VAR_db_password:            ${{ secrets.DB_PASSWORD }}
          TF_VAR_mongo_uri:              ${{ secrets.MONGO_URI }}
          TF_VAR_redis_url:              ${{ secrets.REDIS_URL }}
          TF_VAR_secret_key:             ${{ secrets.SECRET_KEY }}
          TF_VAR_jwt_secret:             ${{ secrets.JWT_SECRET }}
          TF_VAR_spring_datasource_url:  ${{ secrets.SPRING_DATASOURCE_URL }}
          TF_VAR_spring_datasource_user: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          TF_VAR_spring_datasource_pass: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          TF_VAR_spring_mongodb_uri:     ${{ secrets.SPRING_DATA_MONGODB_URI }}
          TF_VAR_rds_db_name:            ${{ secrets.DB_NAME }}
          TF_VAR_rds_db_username:        ${{ secrets.DB_USER }}
          TF_VAR_rds_db_password:        ${{ secrets.DB_PASSWORD }}
          TF_VAR_node_instance_type:     ${{ secrets.NODE_INSTANCE_TYPE }}
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"
      - name: Capture Terraform outputs
        id: tf_out
        working-directory: terraform
        run: |
          # Derive safe project name the same way Terraform does (local.name_safe)
          PROJECT_SAFE=$(echo "${{ secrets.PROJECT_NAME }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/-\{2,\}/-/g' \
            | sed 's/^-//; s/-$//' \
            | cut -c1-24 \
            | sed 's/-$//')

          # Capture each output independently so one failure never blocks the others
          CLUSTER_NAME=$(terraform output -raw cluster_name 2>/dev/null || echo "${PROJECT_SAFE}-eks")
          NAMESPACE=$(terraform output -raw namespace 2>/dev/null || echo "${PROJECT_SAFE}")
          ECR_URL=$(terraform output -raw ecr_repository_url 2>/dev/null || echo "")

          # app_env_json is sensitive — must use -json and extract the value field
          APP_ENV_JSON=$(terraform output -json app_env_json 2>/dev/null \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d)" 2>/dev/null \
            || echo "{}")

          echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT
          echo "namespace=${NAMESPACE}"       >> $GITHUB_OUTPUT
          echo "ecr_url=${ECR_URL}"           >> $GITHUB_OUTPUT
          echo "app_env_json=${APP_ENV_JSON}" >> $GITHUB_OUTPUT

          echo "Cluster : ${CLUSTER_NAME}"
          echo "Namespace: ${NAMESPACE}"

  deploy:
    name: Deploy to EKS (kubectl + helm)
    runs-on: ubuntu-latest
    needs: [build_push, provision]
    outputs:
      url: ${{ steps.ingress.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.31.0'
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.15.0'
      - name: Update kubeconfig
        run: |
          CLUSTER_NAME="${{ needs.provision.outputs.cluster_name }}"
          if [ -z "$CLUSTER_NAME" ]; then
            CLUSTER_NAME=$(echo "${{ secrets.PROJECT_NAME }}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/-\{2,\}/-/g' \
              | sed 's/^-//; s/-$//' \
              | cut -c1-24 \
              | sed 's/-$//')
            CLUSTER_NAME="${CLUSTER_NAME}-eks"
          fi
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "$CLUSTER_NAME"
      - name: Install AWS Load Balancer Controller
        run: |
          CLUSTER_NAME="${{ needs.provision.outputs.cluster_name }}"
          if [ -z "$CLUSTER_NAME" ]; then
            CLUSTER_NAME=$(echo "${{ secrets.PROJECT_NAME }}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/-\{2,\}/-/g' \
              | sed 's/^-//; s/-$//' \
              | cut -c1-24 \
              | sed 's/-$//')
            CLUSTER_NAME="${CLUSTER_NAME}-eks"
          fi
          helm repo add eks https://aws.github.io/eks-charts 2>/dev/null || true
          helm repo update
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName="${CLUSTER_NAME}" \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --wait --timeout=5m || true
      - name: Deploy application
        run: |
          NAMESPACE="${{ needs.provision.outputs.namespace }}"
          IMAGE="${{ needs.build_push.outputs.image }}"
          APP_ENV_JSON='${{ needs.provision.outputs.app_env_json }}'

          if [ -z "$NAMESPACE" ]; then
            NAMESPACE=$(echo "${{ secrets.PROJECT_NAME }}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/-\{2,\}/-/g' \
              | sed 's/^-//; s/-$//' \
              | cut -c1-24 \
              | sed 's/-$//')
          fi

          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          ENV_VARS=$(python3 << 'PYEOF'
import json, sys
raw = sys.stdin.read().strip()
try:
    d = json.loads(raw)
except Exception:
    d = {}
result = [{'name': k, 'value': str(v)} for k, v in d.items()]
print(json.dumps(result))
PYEOF
<< "INPUTEOF"
${APP_ENV_JSON}
INPUTEOF
)

          cat <<EOF | kubectl apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ secrets.PROJECT_NAME }}
  namespace: ${NAMESPACE}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ${{ secrets.PROJECT_NAME }}
  template:
    metadata:
      labels:
        app: ${{ secrets.PROJECT_NAME }}
    spec:
      containers:
      - name: app
        image: ${IMAGE}
        ports:
        - containerPort: 8000
        env: $(echo "${ENV_VARS}" | python3 -c "import json,sys,yaml; data=json.load(sys.stdin); print(yaml.dump(data, default_flow_style=True).strip())" 2>/dev/null || echo "[]")
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ secrets.PROJECT_NAME }}
  namespace: ${NAMESPACE}
spec:
  selector:
    app: ${{ secrets.PROJECT_NAME }}
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${{ secrets.PROJECT_NAME }}
  namespace: ${NAMESPACE}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ${{ secrets.PROJECT_NAME }}
            port:
              number: 80
EOF
      - name: Get ingress URL
        id: ingress
        run: |
          NAMESPACE="${{ needs.provision.outputs.namespace }}"
          if [ -z "$NAMESPACE" ]; then
            NAMESPACE=$(echo "${{ secrets.PROJECT_NAME }}" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9-]/-/g' \
              | sed 's/-\{2,\}/-/g' \
              | sed 's/^-//; s/-$//' \
              | cut -c1-24 \
              | sed 's/-$//')
          fi
          for i in $(seq 1 20); do
            URL=$(kubectl get ingress "${{ secrets.PROJECT_NAME }}" \
              -n "$NAMESPACE" \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            if [ -n "$URL" ]; then
              echo "url=http://${URL}" >> $GITHUB_OUTPUT
              echo "App URL: http://${URL}"
              break
            fi
            echo "Waiting for ingress... (${i}/20)"
            sleep 15
          done